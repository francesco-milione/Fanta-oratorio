  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 16px;
    padding: 48px 40px; width: 360px; text-align: center;
  }
  .login-card h1 { font-size: 28px; font-weight: 700; color: #f59e0b; margin-bottom: 8px; }
  .login-card p { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
  .login-card input {
    width: 100%; padding: 12px 16px; border-radius: 8px;
    border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
    font-size: 16px; text-align: center; letter-spacing: 4px;
    margin-bottom: 16px; outline: none;
  }
  .login-card input:focus { border-color: #f59e0b; }
  .login-card button {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: #f59e0b; color: #0f172a; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .login-card button:hover { background: #fbbf24; }
  .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* APP */
  #app { display: none; }
  header {
    background: #1e293b; border-bottom: 1px solid #334155;
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 700; color: #f59e0b; }
  header span { color: #94a3b8; font-size: 13px; }
  .logout-btn {
    padding: 6px 16px; border-radius: 6px; border: 1px solid #334155;
    background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px;
  }
  .logout-btn:hover { color: #e2e8f0; border-color: #94a3b8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* GIORNATA SELECTOR */
  .giornata-bar {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 20px 24px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .giornata-bar label { color: #94a3b8; font-size: 14px; font-weight: 600; }
  .giornata-bar select, .giornata-bar input[type=number] {
    padding: 8px 12px; border-radius: 8px; border: 2px solid #334155;
    background: #0f172a; color: #e2e8f0; font-size: 15px; outline: none;
  }
  .giornata-bar select:focus, .giornata-bar input:focus { border-color: #f59e0b; }
  .btn-primary {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: #f59e0b; color: #0f172a; font-weight: 700; cursor: pointer;
    font-size: 14px; transition: background 0.2s;
  }
  .btn-primary:hover { background: #fbbf24; }
  .btn-outline {
    padding: 8px 20px; border-radius: 8px; border: 1px solid #334155;
    background: transparent; color: #e2e8f0; font-weight: 600; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .btn-outline:hover { border-color: #94a3b8; }
  .btn-danger {
    padding: 6px 14px; border-radius: 6px; border: none;
    background: #ef4444; color: white; font-size: 13px; cursor: pointer;
  }
  .btn-danger:hover { background: #dc2626; }
  .btn-green {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: #22c55e; color: #0f172a; font-weight: 700; cursor: pointer;
    font-size: 14px;
  }
  .btn-green:hover { background: #16a34a; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab {
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 600; color: #94a3b8;
    border: 1px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: #e2e8f0; }
  .tab.active { background: #f59e0b; color: #0f172a; border-color: #f59e0b; }

  /* VOTI TABLE */
  .section-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    overflow: hidden;
  }
  .section-header {
    padding: 16px 20px; border-bottom: 1px solid #334155;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .section-header h2 { font-size: 16px; font-weight: 700; }
  .role-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600;
  }
  .badge-edu { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
  .badge-ani { background: #0369a122; color: #38bdf8; border: 1px solid #0369a144; }
  .badge-bam { background: #05966922; color: #34d399; border: 1px solid #05966944; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 16px; text-align: left; font-size: 12px;
    color: #64748b; font-weight: 600; text-transform: uppercase;
    background: #162032; border-bottom: 1px solid #334155;
  }
  tbody tr { border-bottom: 1px solid #1e293b; }
  tbody tr:hover { background: #162032; }
  tbody td { padding: 10px 16px; font-size: 14px; }
  .voto-input {
    width: 80px; padding: 6px 10px; border-radius: 6px;
    border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
    font-size: 14px; text-align: center; outline: none;
  }
  .voto-input:focus { border-color: #f59e0b; }
  .voto-input.filled { border-color: #22c55e44; background: #05966911; }

  /* BONUS FORM */
  .bonus-form {
    padding: 20px; border-bottom: 1px solid #334155;
    display: grid; grid-template-columns: 260px 80px 1fr auto; gap: 12px; align-items: end;
  }
  .form-group label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
  .form-group select, .form-group input {
    width: 100%; padding: 8px 12px; border-radius: 6px;
    border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
    font-size: 14px; outline: none;
  }
  .form-group select:focus, .form-group input:focus { border-color: #f59e0b; }

  /* MULTI-SELECT PERSONAGGI */
  .multi-select-wrapper {
    position: relative;
  }
  .multi-select-trigger {
    width: 100%; padding: 8px 12px; border-radius: 6px;
    border: 2px solid #334155; background: #0f172a; color: #e2e8f0;
    font-size: 14px; cursor: pointer; text-align: left;
    display: flex; align-items: center; justify-content: space-between;
    user-select: none;
  }
  .multi-select-trigger:hover, .multi-select-trigger.open { border-color: #f59e0b; }
  .multi-select-trigger .badge-count {
    background: #f59e0b; color: #0f172a; border-radius: 10px;
    padding: 1px 7px; font-size: 12px; font-weight: 700;
  }
  .multi-select-dropdown {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    z-index: 100; max-height: 280px; overflow: hidden;
    box-shadow: 0 8px 24px #00000080;
    flex-direction: column;
  }
  .multi-select-dropdown.open { display: flex; }
  .multi-select-search {
    padding: 8px 10px; border-bottom: 1px solid #334155;
  }
  .multi-select-search input {
    width: 100%; padding: 6px 10px; border-radius: 6px;
    border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
    font-size: 13px; outline: none;
  }
  .multi-select-search input:focus { border-color: #f59e0b; }
  .multi-select-actions {
    padding: 4px 10px; border-bottom: 1px solid #334155;
    display: flex; gap: 8px;
  }
  .ms-action-btn {
    font-size: 11px; color: #94a3b8; background: none; border: none;
    cursor: pointer; padding: 2px 4px;
  }
  .ms-action-btn:hover { color: #f59e0b; }
  .multi-select-list {
    overflow-y: auto; flex: 1;
  }
  .ms-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer; font-size: 13px;
  }
  .ms-item:hover { background: #162032; }
  .ms-item input[type=checkbox] { accent-color: #f59e0b; width: 14px; height: 14px; }
  .ms-item .ms-role { font-size: 10px; color: #475569; margin-left: auto; }

  /* COPY BUTTONS */
  .btn-copy {
    padding: 8px 14px; border-radius: 8px; border: 1px solid #334155;
    background: transparent; color: #94a3b8; font-size: 13px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy:hover { border-color: #94a3b8; color: #e2e8f0; }
  .export-group { display: flex; gap: 6px; align-items: center; }

  .bonus-list { padding: 0; }
  .bonus-item {
    display: flex; align-items: center; padding: 12px 20px;
    border-bottom: 1px solid #1a2744; gap: 12px;
  }
  .bonus-item:last-child { border-bottom: none; }
  .bonus-badge {
    min-width: 48px; text-align: center; padding: 4px 8px;
    border-radius: 6px; font-weight: 700; font-size: 13px;
  }
  .badge-bonus { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
  .badge-malus { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
  .bonus-nome { font-weight: 600; min-width: 160px; font-size: 14px; }
  .bonus-desc { color: #94a3b8; font-size: 13px; flex: 1; }
  .tipo-btn {
    padding: 6px 16px; border-radius: 6px; border: 2px solid #334155;
    background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .tipo-btn.selected-bonus { border-color: #16a34a; background: #16a34a22; color: #4ade80; }
  .tipo-btn.selected-malus { border-color: #ef4444; background: #ef444422; color: #f87171; }

  .empty-state { padding: 48px; text-align: center; color: #475569; }
  .empty-state svg { margin-bottom: 12px; }

  /* EXPORT */
  .export-bar {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 20px 24px; margin-top: 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .export-bar h3 { font-weight: 700; flex: 1; }
  .export-bar p { color: #94a3b8; font-size: 13px; width: 100%; margin-top: -8px; }

  .no-giornata {
    text-align: center; padding: 80px 20px; color: #475569;
  }
  .no-giornata h2 { font-size: 20px; margin-bottom: 8px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    background: #22c55e; color: #0f172a; padding: 12px 20px;
    border-radius: 8px; font-weight: 700; font-size: 14px;
    transform: translateY(80px); opacity: 0; transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .filter-bar { padding: 12px 20px; border-bottom: 1px solid #334155; display: flex; gap: 8px; }
  .filter-btn {
    padding: 4px 14px; border-radius: 20px; border: 1px solid #334155;
    background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px;
  }
  .filter-btn.active { background: #334155; color: #e2e8f0; }
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 10px;
    padding: 16px 20px;
  }
  .stat-card .label { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: #f59e0b; margin-top: 4px; }
  .stat-card .sub { font-size: 12px; color: #64748b; margin-top: 2px; }
</style>
</head>

  {id:"BAM089",nome:"Poerio Luca",ruolo:"bambino"},
  {id:"BAM090",nome:"Conte Luca",ruolo:"bambino"},
  {id:"BAM091",nome:"Chiacchio Filippo",ruolo:"bambino"},
  {id:"BAM092",nome:"Sabia Donato",ruolo:"bambino"},
  {id:"BAM093",nome:"Galizia Leonardo",ruolo:"bambino"},

];

// ===== STATE =====
const PASSWORD = 'ADMIN2026';
let currentGiornata = null;
let currentTab = 'voti';
let filterRuolo = 'tutti';
let state = {}; // { [giornata]: { voti: {id: valore}, bonusMalus: [{id, punti, desc, tipo}] } }

function loadState() {
  try { state = JSON.parse(localStorage.getItem('fa_admin_state') || '{}'); } catch(e) { state = {}; }
}
function saveState() {
  localStorage.setItem('fa_admin_state', JSON.stringify(state));
}
function getGiornataData(g) {
  if (!state[g]) state[g] = { voti: {}, bonusMalus: [] };
  return state[g];
}

// ===== LOGIN =====
function doLogin() {
  const v = document.getElementById('pwd-input').value;
  if (v === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadState();
    refreshGiornateSelect();
  } else {
    document.getElementById('err-msg').textContent = 'Password errata';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('err-msg').textContent = '';
  currentGiornata = null;
}

// ===== GIORNATE =====
function getGiornateList() {
  return Object.keys(state).map(Number).sort((a,b)=>a-b);
}
function refreshGiornateSelect() {
  const sel = document.getElementById('giornata-select');
  const cur = sel.value;
  const list = getGiornateList();
  sel.innerHTML = '<option value="">-- Seleziona --</option>' +
    list.map(g => `<option value="${g}" ${g==cur?'selected':''}">Giornata ${g}</option>`).join('');
}
function creaGiornata() {
  const n = parseInt(document.getElementById('new-giornata').value);
  if (!n || n < 1 || n > 99) { showToast('Inserisci un numero valido (1-99)', 'error'); return; }
  if (state[n]) { showToast(`Giornata ${n} già esistente!`, 'error'); return; }
  getGiornataData(n);
  saveState();
  refreshGiornateSelect();
  document.getElementById('new-giornata').value = '';
  document.getElementById('giornata-select').value = n;
  loadGiornata(n);
  showToast(`Giornata ${n} creata!`);
}
function loadGiornata(g) {
  if (!g) { currentGiornata = null; renderMain(); return; }
  currentGiornata = parseInt(g);
  renderMain();
}

// ===== RENDER =====
function renderMain() {
  const el = document.getElementById('main-content');
  document.getElementById('header-info').textContent = currentGiornata ? `Giornata ${currentGiornata}` : '';
  if (!currentGiornata) {
    el.innerHTML = `<div class="no-giornata"><h2>Seleziona o crea una giornata</h2><p style="color:#475569;font-size:14px;margin-top:8px;">Usa il pannello sopra per iniziare</p></div>`;
    return;
  }
  const data = getGiornataData(currentGiornata);
  const nVoti = Object.keys(data.voti).length;
  const nBonus = data.bonusMalus.filter(b=>b.tipo==='bonus').length;
  const nMalus = data.bonusMalus.filter(b=>b.tipo==='malus').length;

  el.innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Voti inseriti</div>
        <div class="value">${nVoti}</div>
        <div class="sub">su ${PERSONAGGI.length} personaggi</div>
      </div>
      <div class="stat-card">
        <div class="label">Bonus</div>
        <div class="value" style="color:#4ade80">${nBonus}</div>
        <div class="sub">assegnati questa giornata</div>
      </div>
      <div class="stat-card">
        <div class="label">Malus</div>
        <div class="value" style="color:#f87171">${nMalus}</div>
        <div class="sub">assegnati questa giornata</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${currentTab==='voti'?'active':''}" onclick="switchTab('voti')">📊 Voti</div>
      <div class="tab ${currentTab==='bonus'?'active':''}" onclick="switchTab('bonus')">⭐ Bonus / Malus</div>
    </div>
    <div id="tab-content"></div>
    <div class="export-bar">
      <div>
        <h3>📥 Esporta CSV Giornata ${currentGiornata}</h3>
        <p>Scarica i file CSV o copiaci il contenuto direttamente</p>
      </div>
      <div class="export-group">
        <button class="btn-green" onclick="exportVotazioni()">⬇ votazioni.csv</button>
        <button class="btn-copy" onclick="copyVotazioni()" title="Copia negli appunti">📋 Copia</button>
      </div>
      <div class="export-group">
        <button class="btn-outline" onclick="exportBonusMalus()">⬇ bonus_malus.csv</button>
        <button class="btn-copy" onclick="copyBonusMalus()" title="Copia negli appunti">📋 Copia</button>
      </div>
      <button class="btn-outline" onclick="exportAll()">⬇ Entrambi</button>
    </div>
  `;
  renderTab();
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase().includes(t==='voti'?'voti':'bonus'));
  });
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tab-content');
  if (currentTab === 'voti') renderVoti(el);
  else renderBonus(el);
}

// ===== VOTI =====
function renderVoti(container) {
  const data = getGiornataData(currentGiornata);
  const ruoli = ['tutti','educatore','animatore','bambino'];
  const filtered = filterRuolo === 'tutti' ? PERSONAGGI : PERSONAGGI.filter(p => p.ruolo === filterRuolo);

  container.innerHTML = `
    <div class="section-card">
      <div class="section-header">
        <h2>Voti Base</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn-outline" onclick="compilaVotiAuto()" title="Imposta tutti i mancanti a 6.0">Auto-fill 6.0</button>
          <button class="btn-danger" onclick="svuotaVoti()" title="Cancella tutti i voti">Reset</button>
        </div>
      </div>
      <div class="filter-bar">
        ${ruoli.map(r => `<button class="filter-btn ${filterRuolo===r?'active':''}" onclick="setFilter('${r}')">${r.charAt(0).toUpperCase()+r.slice(1)}</button>`).join('')}
        <span style="color:#475569;font-size:12px;margin-left:auto;align-self:center">${filtered.length} personaggi</span>
      </div>
      <table>
        <thead><tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Ruolo</th>
          <th>Voto base</th>
        </tr></thead>
        <tbody>
          ${filtered.map(p => {
            const v = data.voti[p.id] || '';
            const badge = p.ruolo==='educatore' ? 'badge-edu' : p.ruolo==='animatore' ? 'badge-ani' : 'badge-bam';
            return `<tr>
              <td style="color:#475569;font-size:12px">${p.id}</td>
              <td style="font-weight:500">${p.nome}</td>
              <td><span class="role-badge ${badge}">${p.ruolo}</span></td>
              <td>
                <input class="voto-input ${v?'filled':''}" type="number" min="0" max="10" step="0.5"
                  value="${v}" placeholder="—"
                  onchange="setVoto('${p.id}', this.value)"
                  oninput="this.className='voto-input'+(this.value?' filled':'')"
                />
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function setFilter(r) {
  filterRuolo = r;
  renderTab();
}
function setVoto(id, val) {
  const data = getGiornataData(currentGiornata);
  if (val === '' || val === null) delete data.voti[id];
  else data.voti[id] = parseFloat(val);
  saveState();
  // update stats quietly
  updateStats();
}
function updateStats() {
  const data = getGiornataData(currentGiornata);
  const n = Object.keys(data.voti).length;
  const el = document.querySelector('.stat-card .value');
  if (el) el.textContent = n;
}
function compilaVotiAuto() {
  const data = getGiornataData(currentGiornata);
  PERSONAGGI.forEach(p => { if (!data.voti[p.id]) data.voti[p.id] = 6.0; });
  saveState();
  renderMain();
  showToast('Voti mancanti impostati a 6.0');
}
function svuotaVoti() {
  if (!confirm('Cancellare tutti i voti di questa giornata?')) return;
  getGiornataData(currentGiornata).voti = {};
  saveState();
  renderMain();
  showToast('Voti eliminati');
}

// ===== BONUS/MALUS =====
let newBonusTipo = 'bonus';
function renderBonus(container) {
  const data = getGiornataData(currentGiornata);
  const items = data.bonusMalus || [];

  container.innerHTML = `
    <div class="section-card">
      <div class="section-header">
        <h2>Aggiungi Bonus / Malus</h2>
      </div>
      <div class="bonus-form">
        <div class="form-group">
          <label>Personaggi <span id="bm-count-label" style="color:#f59e0b"></span></label>
          <div class="multi-select-wrapper" id="ms-wrapper">
            <button class="multi-select-trigger" id="ms-trigger" onclick="toggleMultiSelect(event)">
              <span id="ms-trigger-text">-- Scegli uno o più --</span>
              <span id="ms-badge" style="display:none" class="badge-count">0</span>
            </button>
            <div class="multi-select-dropdown" id="ms-dropdown">
              <div class="multi-select-search">
                <input type="text" placeholder="🔍 Cerca..." id="ms-search" oninput="filterMsItems()" onclick="event.stopPropagation()" />
              </div>
              <div class="multi-select-actions">
                <button class="ms-action-btn" onclick="selectAllVisible()">Seleziona tutti</button>
                <span style="color:#334155">|</span>
                <button class="ms-action-btn" onclick="deselectAll()">Deseleziona tutti</button>
              </div>
              <div class="multi-select-list" id="ms-list">
                ${PERSONAGGI.map(p => {
                  const badge = p.ruolo==='educatore' ? 'edu' : p.ruolo==='animatore' ? 'ani' : 'bam';
                  return `<label class="ms-item" data-nome="${p.nome.toLowerCase()}" data-id="${p.id}">
                    <input type="checkbox" value="${p.id}" onchange="updateMsTrigger()" />
                    <span>${p.nome}</span>
                    <span class="ms-role">${p.id}</span>
                  </label>`;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Punti</label>
          <input type="number" id="bm-punti" min="0.5" max="10" step="0.5" placeholder="es. 2" />
        </div>
        <div class="form-group">
          <label>Descrizione</label>
          <input type="text" id="bm-desc" placeholder="es. Ha vinto la gara di canto" />
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <div style="display:flex;gap:8px;margin-top:2px">
            <button class="tipo-btn ${newBonusTipo==='bonus'?'selected-bonus':''}" onclick="setTipo('bonus')">+ Bonus</button>
            <button class="tipo-btn ${newBonusTipo==='malus'?'selected-malus':''}" onclick="setTipo('malus')">− Malus</button>
          </div>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn-primary" onclick="aggiungiBonus()">Aggiungi</button>
        </div>
      </div>
      <div class="bonus-list">
        ${items.length === 0 ? `<div class="empty-state">Nessun bonus/malus ancora per questa giornata</div>` :
          items.map((b, i) => {
            const p = PERSONAGGI.find(x => x.id === b.id);
            const segno = b.tipo === 'bonus' ? '+' : '-';
            return `
            <div class="bonus-item">
              <span class="bonus-badge ${b.tipo==='bonus'?'badge-bonus':'badge-malus'}">${segno}${b.punti}</span>
              <span class="bonus-nome">${p ? p.nome : b.id}</span>
              <span class="bonus-desc">${b.desc}</span>
              <span class="role-badge ${b.tipo==='bonus'?'badge-bam':'badge-edu'}" style="font-size:11px">${b.tipo}</span>
              <button class="btn-danger" onclick="rimuoviBonus(${i})">✕</button>
            </div>`;
          }).join('')}
      </div>
    </div>
  `;
}

function setTipo(t) {
  newBonusTipo = t;
  renderTab();
}

// Multi-select helpers
function toggleMultiSelect(e) {
  e.stopPropagation();
  const dd = document.getElementById('ms-dropdown');
  const trigger = document.getElementById('ms-trigger');
  const isOpen = dd.classList.contains('open');
  dd.classList.toggle('open');
  trigger.classList.toggle('open', !isOpen);
  if (!isOpen) document.getElementById('ms-search').focus();
}
function filterMsItems() {
  const q = document.getElementById('ms-search').value.toLowerCase();
  document.querySelectorAll('#ms-list .ms-item').forEach(el => {
    el.style.display = el.dataset.nome.includes(q) || el.dataset.id.toLowerCase().includes(q) ? '' : 'none';
  });
}
function updateMsTrigger() {
  const checked = [...document.querySelectorAll('#ms-list input[type=checkbox]:checked')];
  const badge = document.getElementById('ms-badge');
  const text = document.getElementById('ms-trigger-text');
  if (checked.length === 0) {
    text.textContent = '-- Scegli uno o più --';
    badge.style.display = 'none';
  } else if (checked.length === 1) {
    const p = PERSONAGGI.find(x => x.id === checked[0].value);
    text.textContent = p ? p.nome : checked[0].value;
    badge.style.display = 'none';
  } else {
    text.textContent = `${checked.length} selezionati`;
    badge.textContent = checked.length;
    badge.style.display = '';
  }
}
function selectAllVisible() {
  document.querySelectorAll('#ms-list .ms-item').forEach(el => {
    if (el.style.display !== 'none') el.querySelector('input').checked = true;
  });
  updateMsTrigger();
}
function deselectAll() {
  document.querySelectorAll('#ms-list input[type=checkbox]').forEach(cb => cb.checked = false);
  updateMsTrigger();
}
// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const wrapper = document.getElementById('ms-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('ms-dropdown')?.classList.remove('open');
    document.getElementById('ms-trigger')?.classList.remove('open');
  }
});

function aggiungiBonus() {
  const selectedIds = [...document.querySelectorAll('#ms-list input[type=checkbox]:checked')].map(cb => cb.value);
  const punti = parseFloat(document.getElementById('bm-punti').value);
  const desc = document.getElementById('bm-desc').value.trim();
  if (selectedIds.length === 0) { showToast('Seleziona almeno un personaggio', 'error'); return; }
  if (!punti || punti <= 0) { showToast('Inserisci i punti (>0)', 'error'); return; }
  if (!desc) { showToast('Inserisci una descrizione', 'error'); return; }
  const data = getGiornataData(currentGiornata);
  selectedIds.forEach(id => {
    data.bonusMalus.push({ id, punti, desc, tipo: newBonusTipo });
  });
  saveState();
  renderMain();
  const label = newBonusTipo === 'bonus' ? 'Bonus' : 'Malus';
  showToast(selectedIds.length === 1 ? `${label} aggiunto!` : `${label} aggiunto a ${selectedIds.length} personaggi!`);
}
function rimuoviBonus(i) {
  const data = getGiornataData(currentGiornata);
  data.bonusMalus.splice(i, 1);
  saveState();
  renderMain();
}

// ===== EXPORT =====
function csvEscape(v) {
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g,'""')}"`;
  return s;
}
function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
function exportVotazioni() {
  const { rows } = buildVotazioniCSV();
  if (rows.length === 1) { showToast('Nessun voto inserito!', 'error'); return; }
  downloadCSV(`votazioni_g${currentGiornata}.csv`, rows);
  showToast(`votazioni_g${currentGiornata}.csv scaricato`);
}
function exportBonusMalus() {
  const { rows } = buildBonusMalusCSV();
  if (rows.length === 1) { showToast('Nessun bonus/malus inserito!', 'error'); return; }
  downloadCSV(`bonus_malus_g${currentGiornata}.csv`, rows);
  showToast(`bonus_malus_g${currentGiornata}.csv scaricato`);
}
function exportAll() {
  exportVotazioni();
  setTimeout(exportBonusMalus, 300);
}

function buildVotazioniCSV() {
  const data = getGiornataData(currentGiornata);
  const rows = [['id_personaggio','giorno','voto_base']];
  for (const [id, voto] of Object.entries(data.voti)) {
    rows.push([id, currentGiornata, voto]);
  }
  return { rows, csv: rows.map(r => r.map(csvEscape).join(',')).join('\n') };
}
function buildBonusMalusCSV() {
  const data = getGiornataData(currentGiornata);
  const rows = [['id_personaggio','giorno','punti','descrizione','tipo']];
  for (const b of data.bonusMalus) {
    const segno = b.tipo === 'bonus' ? '+' : '-';
    rows.push([b.id, currentGiornata, `${segno}${b.punti}`, b.desc, b.tipo]);
  }
  return { rows, csv: rows.map(r => r.map(csvEscape).join(',')).join('\n') };
}
function copyVotazioni() {
  const { rows, csv } = buildVotazioniCSV();
  if (rows.length === 1) { showToast('Nessun voto inserito!', 'error'); return; }
  navigator.clipboard.writeText(csv).then(() => showToast('Votazioni copiate negli appunti!'));
}
function copyBonusMalus() {
  const { rows, csv } = buildBonusMalusCSV();
  if (rows.length === 1) { showToast('Nessun bonus/malus inserito!', 'error'); return; }
  navigator.clipboard.writeText(csv).then(() => showToast('Bonus/malus copiati negli appunti!'));
}

// ===== TOAST =====
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#ef4444' : '#22c55e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
