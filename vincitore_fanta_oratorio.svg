<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="1200" fill="url(#bg)"/>

  <!-- confetti dots -->
  <g opacity="0.55">
    <circle cx="60"  cy="90"  r="6" fill="#f59e0b"/>
    <circle cx="140" cy="50"  r="5" fill="#22c55e"/>
    <circle cx="220" cy="120" r="7" fill="#ec4899"/>
    <circle cx="760" cy="80"  r="6" fill="#3b82f6"/>
    <circle cx="820" cy="150" r="5" fill="#f59e0b"/>
    <circle cx="700" cy="40"  r="5" fill="#22c55e"/>
    <circle cx="90"  cy="1120" r="6" fill="#6366f1"/>
    <circle cx="810" cy="1140" r="7" fill="#f59e0b"/>
    <circle cx="180" cy="1160" r="5" fill="#ec4899"/>
    <circle cx="750" cy="1100" r="5" fill="#22c55e"/>
  </g>

  <!-- Header -->
  <text x="450" y="110" text-anchor="middle" font-size="34" fill="#fde68a" letter-spacing="6" font-weight="bold">FANTA ORATORIO 2026</text>
  <text x="450" y="180" text-anchor="middle" font-size="64" fill="#ffffff" font-weight="900">È FINITA! 🎉</text>
  <text x="450" y="220" text-anchor="middle" font-size="22" fill="#c7d2fe">Ultima giornata giocata — classifica finale delle squadre</text>

  <!-- Trophy + winner banner -->
  <g filter="url(#shadow)">
    <circle cx="450" cy="330" r="90" fill="url(#gold)"/>
    <text x="450" y="358" text-anchor="middle" font-size="90">🦁</text>
  </g>
  <text x="450" y="470" text-anchor="middle" font-size="30" fill="#fde68a" letter-spacing="3">CAMPIONI DEL FANTA ORATORIO</text>
  <text x="450" y="540" text-anchor="middle" font-size="80" fill="#ffffff" font-weight="900">LEONI</text>
  <text x="450" y="580" text-anchor="middle" font-size="26" fill="#fde68a" font-weight="bold">250 punti</text>

  <!-- Podium -->
  <g filter="url(#shadow)">
    <!-- 2nd Gechi -->
    <rect x="140" y="820" width="180" height="140" rx="10" fill="#22c55e"/>
    <text x="230" y="870" text-anchor="middle" font-size="44">🦎</text>
    <text x="230" y="905" text-anchor="middle" font-size="22" fill="#ffffff" font-weight="bold">2°</text>

    <!-- 1st Leoni -->
    <rect x="360" y="740" width="180" height="220" rx="10" fill="#f59e0b"/>
    <text x="450" y="800" text-anchor="middle" font-size="50">🦁</text>
    <text x="450" y="840" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="bold">1°</text>

    <!-- 3rd Squali -->
    <rect x="580" y="860" width="180" height="100" rx="10" fill="#6366f1"/>
    <text x="670" y="905" text-anchor="middle" font-size="40">🦈</text>
    <text x="670" y="935" text-anchor="middle" font-size="20" fill="#ffffff" font-weight="bold">3°</text>
  </g>

  <text x="230" y="1000" text-anchor="middle" font-size="20" fill="#ffffff" font-weight="bold">GECHI</text>
  <text x="230" y="1025" text-anchor="middle" font-size="18" fill="#e5e7eb">216 pt</text>

  <text x="450" y="1000" text-anchor="middle" font-size="22" fill="#ffffff" font-weight="bold">LEONI</text>
  <text x="450" y="1025" text-anchor="middle" font-size="19" fill="#fde68a">250 pt</text>

  <text x="670" y="1000" text-anchor="middle" font-size="20" fill="#ffffff" font-weight="bold">SQUALI</text>
  <text x="670" y="1025" text-anchor="middle" font-size="18" fill="#e5e7eb">196 pt</text>

  <!-- 4th place -->
  <text x="450" y="1075" text-anchor="middle" font-size="20" fill="#c7d2fe">🦅 4° Aquile — 195 pt</text>

  <text x="450" y="1150" text-anchor="middle" font-size="18" fill="#a5b4fc">Grazie a tutti gli educatori, animatori, pre animatori e amici di San Carlo per un'estate fantastica!</text>
</svg>
